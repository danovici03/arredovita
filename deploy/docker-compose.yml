name: arredovita

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        MEDUSA_ADMIN_BACKEND_URL: https://api.arredovita.it
        DISABLE_MEDUSA_ADMIN: "false"
    image: arredovita-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
      RUN_MIGRATIONS: "true"
      CREATE_ADMIN_EMAIL: ${ADMIN_EMAIL}
      CREATE_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MEDUSA_BACKEND_URL: https://api.arredovita.it
      MEDUSA_ADMIN_BACKEND_URL: https://api.arredovita.it
      DISABLE_MEDUSA_ADMIN: "false"
      STOREFRONT_REVALIDATE_URL: ${STOREFRONT_REVALIDATE_URL:-https://arredovita.it/api/revalidate}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    volumes:
      - backend_static:/app/static
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  storefront:
    build:
      context: ../storefront
      dockerfile: Dockerfile
      args:
        MEDUSA_BACKEND_URL: https://api.arredovita.it
        NEXT_PUBLIC_BASE_URL: https://arredovita.it
        NEXT_PUBLIC_DEFAULT_REGION: it
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
        NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY:-}
    image: arredovita-storefront:latest
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      MEDUSA_BACKEND_URL: https://api.arredovita.it
      NEXT_PUBLIC_BASE_URL: https://arredovita.it
      NEXT_PUBLIC_DEFAULT_REGION: it
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
      NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY:-}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - storefront

volumes:
  postgres_data:
  redis_data:
  backend_static:
  caddy_data:
  caddy_config:
